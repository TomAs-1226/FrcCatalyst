<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0f14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141a24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="portalAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9800;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" style="stop-color:#00b4ff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#00b4ff;stop-opacity:0.85" />
    </radialGradient>
    <radialGradient id="orangeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" style="stop-color:#ff9800;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#ff9800;stop-opacity:0.9" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="300" rx="16" fill="url(#bannerBg)"/>
  <!-- Accent line (blue -> orange, the two portals) -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#portalAccent)"/>
  <!-- Hazard stripes, faint, upper-right: experimental marker -->
  <g opacity="0.06">
    <rect x="980" y="-40" width="26" height="420" transform="rotate(30 993 150)" fill="#ff9800"/>
    <rect x="1040" y="-40" width="26" height="420" transform="rotate(30 1053 150)" fill="#ff9800"/>
    <rect x="1100" y="-40" width="26" height="420" transform="rotate(30 1113 150)" fill="#ff9800"/>
  </g>
  <!-- Portal icon: two glowing ellipses (blue + orange) -->
  <g transform="translate(120,150)">
    <ellipse cx="-28" cy="0" rx="34" ry="62" fill="url(#blueGlow)"/>
    <ellipse cx="-28" cy="0" rx="34" ry="62" fill="none" stroke="#00b4ff" stroke-width="5"/>
    <ellipse cx="34" cy="0" rx="34" ry="62" fill="url(#orangeGlow)"/>
    <ellipse cx="34" cy="0" rx="34" ry="62" fill="none" stroke="#ff9800" stroke-width="5"/>
  </g>
  <!-- Title -->
  <text x="250" y="120" font-family="Arial Black, sans-serif" font-weight="900" font-size="66" fill="#ffffff" letter-spacing="3">FrcCatalyst</text>
  <!-- 2027 tag -->
  <rect x="250" y="138" width="150" height="34" rx="6" fill="none" stroke="#ff9800" stroke-width="2"/>
  <text x="325" y="162" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#ff9800" letter-spacing="2">WPILib 2027</text>
  <text x="420" y="161" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#00b4ff">migration branch</text>
  <!-- Warning line -->
  <text x="252" y="205" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="#ff9800">&#9888; EXPERIMENTAL &#183; not for use &#183; the cake is a lie</text>
  <text x="252" y="232" font-family="Arial, sans-serif" font-weight="300" font-size="16" fill="#8892b0">The stable library lives on main (WPILib 2026). See MIGRATION_2027.md.</text>
  <!-- Version badge -->
  <rect x="252" y="248" width="118" height="22" rx="4" fill="#ff9800"/>
  <text x="311" y="264" text-anchor="middle" font-family="monospace" font-size="12" fill="#0b0f14" font-weight="700">2027 &#183; alpha</text>
</svg>
