<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1116"/>
      <stop offset="100%" stop-color="#1a1f2b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>
  <!-- Amber accent line -->
  <rect x="0" y="296" width="1200" height="4" fill="#f5a623"/>
  <!-- Faint hazard stripes upper-right: under-construction vibe -->
  <g opacity="0.05">
    <rect x="1010" y="-40" width="24" height="420" transform="rotate(30 1022 150)" fill="#f5a623"/>
    <rect x="1065" y="-40" width="24" height="420" transform="rotate(30 1077 150)" fill="#f5a623"/>
    <rect x="1120" y="-40" width="24" height="420" transform="rotate(30 1132 150)" fill="#f5a623"/>
  </g>
  <!-- Warning-triangle icon -->
  <g transform="translate(66,92)">
    <path d="M60,6 L114,114 L6,114 Z" fill="none" stroke="#f5a623" stroke-width="7" stroke-linejoin="round"/>
    <rect x="55" y="42" width="10" height="42" rx="4" fill="#f5a623"/>
    <circle cx="60" cy="98" r="6" fill="#f5a623"/>
  </g>
  <!-- Title -->
  <text x="228" y="112" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="56" fill="#ffffff" letter-spacing="2">FrcCatalyst</text>
  <!-- Subtitle -->
  <text x="230" y="152" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#f5a623">WPILib 2027 migration branch</text>
  <!-- Warning line -->
  <text x="230" y="192" font-family="Arial, sans-serif" font-weight="700" font-size="17" fill="#f5a623">EXPERIMENTAL &#183; not for use on a robot yet</text>
  <!-- Info line -->
  <text x="230" y="219" font-family="Arial, sans-serif" font-weight="300" font-size="15" fill="#8892b0">The stable library is on main (WPILib 2026). See MIGRATION_2027.md.</text>
  <!-- Version badge -->
  <rect x="230" y="236" width="112" height="22" rx="4" fill="#f5a623"/>
  <text x="286" y="252" text-anchor="middle" font-family="monospace" font-size="12" fill="#0e1116" font-weight="700">2027 &#183; alpha</text>
</svg>
